<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>MusicToDiscord</title>
<style>
  :root {
    --bg: #0F0F14;
    --bg-raised: #17171F;
    --indigo: #5865F2;
    --magenta: #B06CFF;
    --sky: #3FC7FF;
    --text: #F4F2F8;
    --text-dim: #9A97A8;
    --divider: #26242E;
    --good: #3FE08A;
    --bad: #FF6B6B;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
    overflow: hidden;
    user-select: none;
  }

  #drag-region {
    height: 32px;
    -webkit-app-region: drag;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 0 8px;
    position: relative;
    z-index: 10;
  }

  #drag-region .app-label {
    -webkit-app-region: no-drag;
    position: absolute;
    left: 14px;
    top: 0;
    height: 32px;
    display: flex;
    align-items: center;
    font-size: 12px;
    letter-spacing: 0.04em;
    color: var(--text-dim);
    font-weight: 600;
  }

  .win-btn {
    -webkit-app-region: no-drag;
    width: 28px;
    height: 24px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    border-radius: 6px;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .win-btn:hover { background: var(--bg-raised); color: var(--text); }

  /* ---- Hero: album art with bleeding gradient ---- */
  #hero {
    position: relative;
    padding: 28px 28px 20px;
    display: flex;
    gap: 20px;
    align-items: center;
  }

  #hero::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(120% 100% at 0% 0%, rgba(88,101,242,0.35), transparent 60%),
                radial-gradient(120% 100% at 100% 100%, rgba(63,199,255,0.25), transparent 60%);
    pointer-events: none;
  }

  #art-wrap {
    position: relative;
    width: 88px;
    height: 88px;
    flex-shrink: 0;
    border-radius: 14px;
    overflow: hidden;
    background: linear-gradient(135deg, var(--indigo), var(--magenta) 55%, var(--sky));
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }

  #art-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
  }

  #art-fallback {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #art-fallback img { width: 100%; height: 100%; object-fit: cover; }

  #track-meta {
    position: relative;
    min-width: 0;
    flex: 1;
  }

  #eyebrow {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 6px;
  }

  #status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: background 0.3s;
  }
  #status-dot.live { background: var(--good); box-shadow: 0 0 8px var(--good); }
  #status-dot.off { background: var(--bad); }

  #track-name {
    font-size: 18px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }

  #track-artist {
    font-size: 13px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ---- Groove progress bar (signature element) ---- */
  #groove-wrap {
    padding: 0 28px 22px;
  }

  #groove {
    position: relative;
    height: 22px;
    display: flex;
    align-items: center;
  }

  #groove-track {
    position: absolute;
    left: 0; right: 0;
    height: 3px;
    border-radius: 3px;
    background: repeating-linear-gradient(
      90deg,
      var(--divider) 0px, var(--divider) 3px,
      transparent 3px, transparent 6px
    );
  }

  #groove-fill {
    position: absolute;
    left: 0;
    height: 3px;
    border-radius: 3px;
    background: linear-gradient(90deg, var(--indigo), var(--sky));
    width: 0%;
    transition: width 0.3s linear;
  }

  #groove-needle {
    position: absolute;
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: var(--text);
    left: 0%;
    box-shadow: 0 0 0 3px rgba(244,242,248,0.15);
    transition: left 0.3s linear;
  }

  #time-row {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
    font-family: "SF Mono", "Cascadia Mono", Consolas, monospace;
    font-size: 11px;
    color: var(--text-dim);
  }

  #timer-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2px 28px 14px;
  }

  #timer-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.2px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  #timer-display {
    font-family: "SF Mono", "Cascadia Mono", Consolas, monospace;
    font-size: 36px;
    font-weight: 600;
    line-height: 1;
    letter-spacing: 0.5px;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    transition: color 0.2s;
  }

  #timer-display.paused {
    color: var(--text-dim);
  }

  /* ---- Divider ---- */
  .divider {
    height: 1px;
    background: var(--divider);
    margin: 0 28px;
  }

  /* ---- Settings rows ---- */
  #settings {
    padding: 18px 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
  }

  .row-label {
    font-size: 13px;
    color: var(--text);
  }

  .row-sub {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }

  .pill-btn {
    -webkit-app-region: no-drag;
    background: var(--bg-raised);
    border: 1px solid var(--divider);
    color: var(--text);
    font-size: 12px;
    font-weight: 600;
    padding: 7px 14px;
    border-radius: 20px;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .pill-btn:hover { border-color: var(--indigo); }
  .pill-btn:active { transform: scale(0.97); }

  .pill-btn.danger:hover { border-color: var(--bad); }

  /* Toggle switch */
  .toggle {
    -webkit-app-region: no-drag;
    width: 38px;
    height: 22px;
    border-radius: 12px;
    background: var(--divider);
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .toggle.on { background: var(--indigo); }
  .toggle-knob {
    position: absolute;
    top: 2px;
    left: 2px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--text);
    transition: left 0.2s;
  }
  .toggle.on .toggle-knob { left: 18px; }

  /* Keyboard focus visibility */
  button:focus-visible, .toggle:focus-visible {
    outline: 2px solid var(--sky);
    outline-offset: 2px;
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>

  <div id="drag-region">
    <span class="app-label">MUSIC TO DISCORD</span>
    <button class="win-btn" id="btn-min" title="Minimize to tray" aria-label="Minimize to tray">&#8211;</button>
    <button class="win-btn" id="btn-close" title="Close" aria-label="Close window">&#10005;</button>
  </div>

  <div id="hero">
    <div id="art-wrap">
      <img id="art-img" alt="" />
      <div id="art-fallback">
        <img src="../assets/fallback-art.png" alt="" />
      </div>
    </div>
    <div id="track-meta">
      <div id="eyebrow"><span id="status-dot"></span><span id="status-text">Checking…</span></div>
      <div id="track-name">Nothing playing</div>
      <div id="track-artist">Open Apple Music and press play</div>
    </div>
  </div>

  <div id="timer-wrap">
    <div id="timer-label">Time left</div>
    <div id="timer-display">0:00</div>
  </div>

  <div id="groove-wrap">
    <div id="groove">
      <div id="groove-track"></div>
      <div id="groove-fill"></div>
      <div id="groove-needle"></div>
    </div>
    <div id="time-row">
      <span id="time-elapsed">0:00</span>
      <span id="time-remaining">&minus;0:00</span>
    </div>
  </div>

  <div class="divider"></div>

  <div id="settings">
    <div class="row">
      <div>
        <div class="row-label">Sync with Discord</div>
        <div class="row-sub" id="sync-sub">Updates your status while your music plays</div>
      </div>
      <div class="toggle on" id="toggle-sync" role="switch" aria-checked="true" tabindex="0"></div>
    </div>
    <div class="row">
      <div>
        <div class="row-label">App version</div>
        <div class="row-sub" id="version-sub">v1.2.0</div>
      </div>
      <button class="pill-btn" id="btn-update">Check for updates</button>
    </div>
    <div class="row">
      <div>
        <div class="row-label">Quit MusicToDiscord</div>
        <div class="row-sub">Stops syncing and closes the app</div>
      </div>
      <button class="pill-btn danger" id="btn-quit">Quit</button>
    </div>
  </div>

  <script src="./renderer.js"></script>
</body>
</html>
